name: Deploy Admin Dashboard to Vercel

on:
  push:
    branches:
      - main
      - staging

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v20
        id: vercel_deploy
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          
          # Jika push ke main, deploy ke lingkungan Production Vercel. 
          # Jika staging, Vercel akan menganggapnya Preview environment.
          vercel-args: ${{ github.ref_name == 'main' && '--prod' || '' }}
          
          # Mengatur subdomain khusus untuk branch staging.
          alias-domains: ${{ github.ref_name == 'staging' && 'admin-haystudio-staging.postmatic.id' || '' }}

      - name: Send Notification to Discord
        uses: sarisia/actions-status-discord@v1
        if: always()
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          status: ${{ job.status }}
          username: "中野 二乃 (Admin Tools)"
          title: "Update Admin Dashboard: ${{ github.ref_name == 'main' && 'PRODUCTION 🚀' || 'STAGING 🛠️' }}"
          content: ${{ job.status == 'failure' && '🚨 **@here Haaah?!** Kalian ini niat bikin alat admin tidak sih?! Deploy-nya gagal tuh! Kalau dashboard admin saja hancur, bagaimana mau ngurusin data utamanya?! Cepat perbaiki!' || '✅ Hmph, akhirnya dashboard adminnya berhasil di-deploy. Y-ya baguslah kalau lancar, jadi kerjaan kalian lebih mudah. Tapi awas kalau masih ada tombol yang error ya!' }}
          description: |
            Pembaruan untuk *Internal Admin Dashboard* sudah selesai diproses. 
            
            Coba kalian tes sendiri! Kalau ada tabel atau data yang nggak muncul, cepat perbaiki kodenya, jangan langsung merengek mencariku! 😤